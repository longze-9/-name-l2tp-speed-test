<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L2TP VPN 测速工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --surface2: #161b28;
    --border: #1e2738;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --green: #00ff88;
    --red: #ff4466;
    --yellow: #ffcc00;
    --text: #e2e8f0;
    --muted: #4a5568;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header-badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    border: 1px solid rgba(0,229,255,0.3);
    padding: 4px 14px;
    border-radius: 2px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  h1 {
    font-family: var(--sans);
    font-size: clamp(28px, 5vw, 46px);
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin-bottom: 10px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Config Panel */
  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }

  .config-item label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .config-item input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    padding: 8px 12px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }

  .config-item input:focus {
    border-color: var(--accent);
  }

  /* Start Button */
  .btn-start {
    width: 100%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 4px;
    color: #fff;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 16px;
    cursor: pointer;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    transition: opacity 0.2s, transform 0.1s;
    margin-bottom: 24px;
  }

  .btn-start:hover { opacity: 0.9; }
  .btn-start:active { transform: scale(0.99); }
  .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-start .btn-glow {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15), transparent);
    transform: translateX(-100%);
    animation: shimmer 2s infinite;
  }

  @keyframes shimmer {
    100% { transform: translateX(100%); }
  }

  /* Status Bar */
  .status-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 1s infinite;
  }

  .status-dot.done { background: var(--green); box-shadow: 0 0 8px var(--green); animation: none; }
  .status-dot.error { background: var(--red); box-shadow: 0 0 8px var(--red); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text { color: var(--text); flex: 1; }
  .status-time { color: var(--muted); font-size: 12px; }

  /* Progress */
  .progress-wrap {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 1px;
  }

  /* Server List */
  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .server-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 24px;
    max-height: 400px;
    overflow-y: auto;
  }

  .server-list::-webkit-scrollbar { width: 4px; }
  .server-list::-webkit-scrollbar-track { background: var(--bg); }
  .server-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .server-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    transition: border-color 0.2s, background 0.2s;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .server-row.success { border-color: rgba(0,255,136,0.2); }
  .server-row.fail { border-color: rgba(255,68,102,0.15); }
  .server-row.testing { border-color: rgba(0,229,255,0.3); background: rgba(0,229,255,0.03); }

  .server-ip {
    font-weight: 600;
    color: var(--text);
    min-width: 140px;
    letter-spacing: 0.5px;
  }

  .server-status {
    flex: 1;
    font-size: 12px;
  }

  .server-latency {
    font-weight: 700;
    font-size: 15px;
    min-width: 80px;
    text-align: right;
  }

  .latency-bar {
    height: 3px;
    border-radius: 2px;
    background: var(--border);
    flex: 1;
    overflow: hidden;
  }

  .latency-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* Results Panel */
  .results-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .results-header {
    background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(0,229,255,0.1));
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .results-title {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    color: var(--accent);
  }

  .result-item {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .result-item:last-child { border-bottom: none; }
  .result-item:hover { background: rgba(0,229,255,0.04); }

  .result-rank {
    font-size: 20px;
    min-width: 36px;
  }

  .result-ip {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
  }

  .result-ms {
    font-size: 22px;
    font-weight: 700;
  }

  .result-copy {
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 3px 8px;
    transition: all 0.2s;
  }

  .result-item:hover .result-copy {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Credentials */
  .creds {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .cred-item label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .cred-value {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green);
    color: #000;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 3px;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 999;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 600px) {
    .config-panel { grid-template-columns: 1fr; }
    .creds { grid-template-columns: 1fr; }
    .latency-bar { display: none; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="header-badge">VPN Utility v2.0</div>
    <h1>L2TP 测速工具</h1>
    <p class="subtitle">CONCURRENT LATENCY TESTER · FREE VPN SERVERS</p>
  </div>

  <!-- Config -->
  <div class="config-panel">
    <div class="config-item">
      <label>Ping 次数</label>
      <input type="number" id="pingCount" value="3" min="1" max="10">
    </div>
    <div class="config-item">
      <label>超时 (秒)</label>
      <input type="number" id="pingTimeout" value="2" min="1" max="10">
    </div>
    <div class="config-item">
      <label>显示 Top N</label>
      <input type="number" id="topN" value="5" min="1" max="20">
    </div>
  </div>

  <!-- Start Button -->
  <button class="btn-start" id="startBtn" onclick="startTest()">
    <div class="btn-glow"></div>
    ▶ 开始测速
  </button>

  <!-- Status -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">准备就绪，点击开始测速</span>
    <span class="status-time" id="statusTime"></span>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- Server List -->
  <div class="section-label" id="serverListLabel" style="display:none">实时测速结果</div>
  <div class="server-list" id="serverList"></div>

  <!-- Results -->
  <div class="results-panel" id="resultsPanel" style="display:none">
    <div class="results-header">
      <span class="results-title">🏆 延迟排名</span>
      <span style="font-size:12px;color:var(--muted)" id="resultsSummary"></span>
    </div>
    <div id="resultsList"></div>
  </div>

  <!-- Credentials -->
  <div class="creds">
    <div class="cred-item"><label>用户名</label><div class="cred-value">vpn</div></div>
    <div class="cred-item"><label>密码</label><div class="cred-value">vpn</div></div>
    <div class="cred-item"><label>IPsec 密钥</label><div class="cred-value">vpn</div></div>
    <div class="cred-item"><label>协议</label><div class="cred-value">L2TP/IPsec</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Fallback servers
const FALLBACK_SERVERS = [
  '219.100.37.176','219.100.37.172','219.100.37.57',
  '219.100.37.206','219.100.37.110','219.100.37.125'
];

// Private/reserved IP check
function isPublicIP(ip) {
  const parts = ip.split('.').map(Number);
  if (parts.length !== 4 || parts.some(p => isNaN(p) || p > 255)) return false;
  const [a, b] = parts;
  if (a === 0 || a === 127 || a >= 224) return false;
  if (a === 10) return false;
  if (a === 172 && b >= 16 && b <= 31) return false;
  if (a === 192 && b === 168) return false;
  return true;
}

// Extract IPs from HTML text
function extractIPs(html) {
  const re = /\b(\d{1,3}\.){3}\d{1,3}\b/g;
  const matches = html.match(re) || [];
  return [...new Set(matches.filter(isPublicIP))];
}

// Simulate ping via fetch timing (browser limitation)
async function measureLatency(ip, count, timeout) {
  const results = [];
  for (let i = 0; i < count; i++) {
    const start = performance.now();
    try {
      await Promise.race([
        fetch(`http://${ip}`, { mode: 'no-cors', cache: 'no-store' }),
        new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), timeout * 1000))
      ]);
      results.push(performance.now() - start);
    } catch(e) {
      // fetch fails for most IPs due to CORS/no-cors — we still get timing for TCP-level attempts
      const elapsed = performance.now() - start;
      if (elapsed < timeout * 1000 - 50) results.push(elapsed);
    }
  }
  if (results.length === 0) return null;
  return results.reduce((a, b) => a + b, 0) / results.length;
}

// UI helpers
function setStatus(msg, state = 'idle') {
  document.getElementById('statusText').textContent = msg;
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (state === 'running' ? ' active' : state === 'done' ? ' done' : state === 'error' ? ' error' : '');
}

function setProgress(pct) {
  document.getElementById('progressBar').style.width = pct + '%';
}

function latencyColor(ms) {
  if (ms < 80) return 'var(--green)';
  if (ms < 200) return 'var(--yellow)';
  return 'var(--red)';
}

function addServerRow(ip, state, ms) {
  const list = document.getElementById('serverList');
  let row = document.getElementById('row-' + ip.replace(/\./g, '-'));
  if (!row) {
    row = document.createElement('div');
    row.id = 'row-' + ip.replace(/\./g, '-');
    row.className = 'server-row ' + state;
    list.appendChild(row);
  }
  const color = ms ? latencyColor(ms) : (state === 'fail' ? 'var(--red)' : 'var(--accent)');
  const barW = ms ? Math.min(100, (ms / 500) * 100) : 0;
  row.className = 'server-row ' + state;
  row.innerHTML = `
    <span class="server-ip">${ip}</span>
    <div class="latency-bar"><div class="latency-fill" style="width:${barW}%;background:${color}"></div></div>
    <span class="server-latency" style="color:${color}">
      ${ms ? ms.toFixed(1) + ' ms' : (state === 'testing' ? '…' : '✗')}
    </span>`;
}

function showResults(results, topN, elapsed) {
  const panel = document.getElementById('resultsPanel');
  const list = document.getElementById('resultsList');
  const summary = document.getElementById('resultsSummary');
  panel.style.display = 'block';
  summary.textContent = `${results.length} 个可用 · 总耗时 ${elapsed}s`;
  const medals = ['🥇','🥈','🥉'];
  list.innerHTML = results.slice(0, topN).map((r, i) => `
    <div class="result-item" onclick="copyIP('${r.ip}')">
      <span class="result-rank">${medals[i] || (i+1)+'.'}</span>
      <span class="result-ip">${r.ip}</span>
      <span class="result-ms" style="color:${latencyColor(r.ms)}">${r.ms.toFixed(1)} ms</span>
      <span class="result-copy">复制 IP</span>
    </div>`).join('');
}

function copyIP(ip) {
  navigator.clipboard.writeText(ip).then(() => showToast('已复制: ' + ip));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function startTest() {
  const btn = document.getElementById('startBtn');
  const pingCount = parseInt(document.getElementById('pingCount').value) || 3;
  const pingTimeout = parseInt(document.getElementById('pingTimeout').value) || 2;
  const topN = parseInt(document.getElementById('topN').value) || 5;

  btn.disabled = true;
  document.getElementById('serverList').innerHTML = '';
  document.getElementById('serverListLabel').style.display = 'block';
  document.getElementById('resultsPanel').style.display = 'none';
  setProgress(0);
  setStatus('正在获取服务器列表...', 'running');

  // Fetch servers (via CORS proxy fallback)
  let servers = FALLBACK_SERVERS;
  try {
    const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent('https://ipspeed.info/pt/free-l2tpipsec.php');
    const res = await Promise.race([
      fetch(proxyUrl),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 8000))
    ]);
    const html = await res.text();
    const fetched = extractIPs(html);
    if (fetched.length > 0) servers = fetched;
    setStatus(`获取到 ${servers.length} 个服务器，开始测速...`, 'running');
  } catch {
    setStatus(`使用备用列表 (${servers.length} 个)，开始测速...`, 'running');
  }

  const startTs = Date.now();
  const results = [];
  let done = 0;

  setStatus(`并发测速 0 / ${servers.length}`, 'running');

  const tasks = servers.map(ip => async () => {
    addServerRow(ip, 'testing', null);
    const ms = await measureLatency(ip, pingCount, pingTimeout);
    done++;
    setProgress((done / servers.length) * 100);
    document.getElementById('statusTime').textContent = `${done}/${servers.length}`;
    if (ms !== null) {
      results.push({ ip, ms });
      addServerRow(ip, 'success', ms);
    } else {
      addServerRow(ip, 'fail', null);
    }
  });

  // Concurrency pool (10)
  const POOL = 10;
  const queue = [...tasks];
  const workers = Array.from({ length: Math.min(POOL, queue.length) }, async () => {
    while (queue.length) await queue.shift()();
  });
  await Promise.all(workers);

  const elapsed = ((Date.now() - startTs) / 1000).toFixed(1);
  results.sort((a, b) => a.ms - b.ms);

  if (results.length > 0) {
    setStatus(`测速完成！${results.length} 个可用，耗时 ${elapsed}s`, 'done');
    showResults(results, topN, elapsed);
  } else {
    setStatus('所有服务器均不可达，请检查网络', 'error');
  }

  setProgress(100);
  btn.disabled = false;
}
</script>
</body>
</html>
